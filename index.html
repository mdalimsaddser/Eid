<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Gift from Sabbir</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <canvas id="star-canvas"></canvas>

    <div class="phone-frame">
        <div class="screen">
            
            <div class="step active" id="step1">
                <div class="gift-wrapper">
                    <div class="box-3d" onclick="goNext(1)">
                        <div class="side front"></div>
                        <div class="side back"></div>
                        <div class="side left"></div>
                        <div class="side right"></div>
                        <div class="side top"></div>
                    </div>
                </div>
                <h2 class="gold-msg">আপনার জন্য একটি সারপ্রাইজ!</h2>
                <button class="btn-open" onclick="goNext(1)">বক্সটি খুলুন</button>
            </div>

            <div class="step" id="step2">
                <div class="glass-card">
                    <span class="eid-icon">🌙</span>
                    <h2 class="wish-title">ঈদ মোবারক!</h2>
                    <p class="wish-text">
                        পবিত্র ঈদুল ফিতরের আনন্দ ছড়িয়ে পড়ুক আপনার প্রতিটি মুহূর্তে। হাসিখুশিতে কাটুক আপনার জীবন।
                    </p>
                </div>
            </div>

            <div class="step" id="step3">
                <canvas id="fireworks"></canvas>
                <h1 class="main-fest-text">শুভ ঈদ!</h1>
                
                <div class="from-tag">
                    শুভেচ্ছান্তে,
                    <span class="from-name">Sabbir</span>
                </div>
            </div>

            <div class="watermark">EID SPECIAL</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
