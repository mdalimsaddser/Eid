
<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Gift from Sabbir</title>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: linear-gradient(135deg, #ffdc73 0%, #ffbf00 50%, #8b6b00 100%);
            --gold-text: #ffcf40;
            --bg-dark: #020205;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            font-family: 'Hind Siliguri', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: white;
        }

        /* Ambient Background Stars */
        #star-canvas {
            position: fixed;
            top: 0; left: 0; z-index: 1;
        }

        /* Mobile Frame */
        .phone-frame {
            width: 360px;
            height: 760px;
            background: #000;
            border: 8px solid #1a1a1a;
            border-radius: 50px;
            position: relative;
            z-index: 10;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9);
            overflow: hidden;
            border: 2px solid #333;
        }

        .screen {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top, #0d1117, #020205);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 30px;
            position: relative;
        }

        /* 3D Gift Box Animation */
        .gift-wrapper {
            perspective: 1000px;
            margin-bottom: 40px;
        }

        .box-3d {
            width: 140px;
            height: 140px;
            position: relative;
            transform-style: preserve-3d;
            animation: rotateBox 8s infinite linear;
            cursor: pointer;
        }

        @keyframes rotateBox {
            0% { transform: rotateY(0deg) rotateX(10deg); }
            100% { transform: rotateY(360deg) rotateX(10deg); }
        }

        .side {
            position: absolute;
            width: 140px;
            height: 140px;
            background: linear-gradient(135deg, #c19a3b, #8a6624);
            border: 1px solid #f9d56e;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }

        .front  { transform: translateZ(70px); }
        .back   { transform: rotateY(180deg) translateZ(70px); }
        .right  { transform: rotateY(90deg) translateZ(70px); }
        .left   { transform: rotateY(-90deg) translateZ(70px); }
        .top    { transform: rotateX(90deg) translateZ(70px); background: #f9d56e; }

        /* Steps */
        .step {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 30px;
            z-index: 20;
        }

        .active { display: flex; animation: fadeIn 1s forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.8); filter: blur(10px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        /* Typography */
        .gold-msg {
            color: var(--gold-text);
            font-size: 1.6rem;
            font-weight: 700;
            margin-top: 20px;
            text-shadow: 0 0 15px rgba(255, 207, 64, 0.4);
        }

        .btn-open {
            margin-top: 30px;
            padding: 15px 40px;
            background: var(--gold);
            border: none;
            border-radius: 50px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(255, 191, 0, 0.3);
            transition: 0.3s;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            padding: 40px 20px;
            border-radius: 30px;
            width: 100%;
        }

        #fireworks {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        .from-tag {
            margin-top: 30px;
            font-size: 1.1rem;
            color: #fff;
            letter-spacing: 1px;
        }

        .from-name {
            display: block;
            font-size: 1.8rem;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
            margin-top: 5px;
        }

        .watermark {
            position: absolute;
            bottom: 25px;
            font-size: 10px;
            opacity: 0.3;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>

    <div class="phone-frame">
        <div class="screen">
            
            <div class="step active" id="step1">
                <div class="gift-wrapper">
                    <div class="box-3d" onclick="goNext(1)">
                        <div class="side front"></div>
                        <div class="side back"></div>
                        <div class="side left"></div>
                        <div class="side right"></div>
                        <div class="side top"></div>
                    </div>
                </div>
                <h2 class="gold-msg">আপনার জন্য একটি সারপ্রাইজ!</h2>
                <button class="btn-open" onclick="goNext(1)">বক্সটি খুলুন</button>
            </div>

            <div class="step" id="step2">
                <div class="glass-card">
                    <span style="font-size: 50px; display: block; margin-bottom: 10px;">🌙</span>
                    <h2 style="color: #ffcf40;">ঈদ মোবারক!</h2>
                    <p style="margin-top: 15px; opacity: 0.9; line-height: 1.6;">
                        পবিত্র ঈদুল ফিতরের আনন্দ ছড়িয়ে পড়ুক আপনার প্রতিটি মুহূর্তে।
                    </p>
                </div>
            </div>

            <div class="step" id="step3">
                <canvas id="fireworks"></canvas>
                <h1 style="font-size: 2.8rem; color: #ffcf40; text-shadow: 0 0 20px gold;">শুভ ঈদ!</h1>
                <p style="margin-top: 10px; opacity: 0.8;">হাসিখুশিতে কাটুক আপনার জীবন</p>
                
                <div class="from-tag">
                    শুভেচ্ছান্তে,
                    <span class="from-name">Sabbir</span>
                </div>
            </div>

            <div class="watermark">EID SPECIAL 2026</div>
        </div>
    </div>

    <script>
        // Stars Animation
        const sCanvas = document.getElementById('star-canvas');
        const sCtx = sCanvas.getContext('2d');
        sCanvas.width = window.innerWidth;
        sCanvas.height = window.innerHeight;

        let stars = [];
        for(let i=0; i<100; i++) {
            stars.push({
                x: Math.random() * sCanvas.width,
                y: Math.random() * sCanvas.height,
                size: Math.random() * 1.5,
                opacity: Math.random()
            });
        }

        function drawStars() {
            sCtx.clearRect(0,0, sCanvas.width, sCanvas.height);
            stars.forEach(s => {
                sCtx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                sCtx.beginPath();
                sCtx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                sCtx.fill();
                s.opacity += (Math.random() - 0.5) * 0.05;
                if(s.opacity < 0) s.opacity = 0;
                if(s.opacity > 1) s.opacity = 1;
            });
            requestAnimationFrame(drawStars);
        }
        drawStars();

        // Navigation
        function goNext(current) {
            document.getElementById(`step${current}`).classList.remove('active');
            const next = current + 1;
            const nextEl = document.getElementById(`step${next}`);
            
            if(nextEl) {
                setTimeout(() => {
                    nextEl.classList.add('active');
                    if(next === 2) setTimeout(() => goNext(2), 4000);
                    if(next === 3) startFireworks();
                }, 600);
            }
        }

        // Fireworks
        function startFireworks() {
            const fCanvas = document.getElementById('fireworks');
            const fCtx = fCanvas.getContext('2d');
            fCanvas.width = 360;
            fCanvas.height = 760;

            let particles = [];
            function burst() {
                const x = Math.random() * fCanvas.width;
                const y = Math.random() * (fCanvas.height/2);
                for(let i=0; i<40; i++) {
                    particles.push({
                        x, y,
                        vx: (Math.random() - 0.5) * 10,
                        vy: (Math.random() - 0.5) * 10,
                        life: 1,
                        c: `hsl(${Math.random()*360}, 100%, 60%)`
                    });
                }
            }

            function animate() {
                fCtx.clearRect(0,0,360,760);
                if(Math.random() < 0.08) burst();
                particles.forEach((p, i) => {
                    p.x += p.vx; p.y += p.vy; p.life -= 0.02;
                    fCtx.globalAlpha = p.life;
                    fCtx.fillStyle = p.c;
                    fCtx.beginPath(); fCtx.arc(p.x, p.y, 2, 0, 7); fCtx.fill();
                    if(p.life <= 0) particles.splice(i, 1);
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
</html>
